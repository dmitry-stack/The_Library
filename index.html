<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search millions of books, build your personal library, and never lose track of what to read next."
    />
    <title>Library</title>
    <script type="module" crossorigin src="/The_Library/index.js"></script>
    
  </head>

  <body>
    <header>
      <div class="top-header">
        <img src="/The_Library/assets/book.svg" alt="Web page logo" class="web-logo" />
        <div class="logo-text">
          <h2>The Library</h2>
          <p>Discover your next favorite book</p>
        </div>
        <button class="theme-toggle" id="theme-toggle">🌙</button>
      </div>
    </header>

    <div class="page-container">
      <main class="content">
        <hr class="solid" />
        <div class="main-content">
          <h1>Discover Your Next Great Read</h1>
          <p>
            Search millions of books, build your personal library, and never
            lose track of what to read next.
          </p>
          <div class="search-filter-container">
            <div class="search-box">
              <img
                src="/The_Library/assets/search.svg"
                alt="Search icon"
                class="search-icon"
              />
              <input
                id="search-input"
                type="text"
                placeholder="Search for books by title or author"
              />
              <button id="search-btn">Search</button>
            </div>
            <div class="filter-box">
              <select id="author-filter">
                <option value="">All Authors</option>
              </select>
            </div>
          </div>
        </div>

        <div class="main-layout">
          <div id="books-container" class="books-grid"></div>
          <aside class="favorites-panel"></aside>
        </div>
      </main>

      <footer>
        <div class="parent">
          <p>Powered by <span class="green">Open Library</span></p>
        </div>
      </footer>
    </div>

  </body>
</html>
